<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マルチエージェントAIチャット</title>
<style>
  body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 10px; }
  #apiKey { width: 100%; padding: 6px; margin-bottom: 10px; }
  #chat { border: 1px solid #ccc; min-height: 400px; padding: 10px; overflow-y: auto; max-height: 60vh; }
  .msg { margin: 10px 0; padding: 8px; border-radius: 6px; }
  .user { background: #e8f0fe; text-align: right; }
  .agent { background: #f1f1f1; }
  .agentName { font-weight: bold; font-size: 0.85em; color: #555; margin-bottom: 4px; }
  .system { color: #888; font-size: 0.8em; }
  #inputArea { display: flex; margin-top: 10px; }
  #userInput { flex: 1; padding: 8px; }
  button { padding: 8px 16px; }
</style>
</head>
<body>

<h2>マルチエージェントAIチャット (Llama 4 Scout / Groq)</h2>

<label for="apiKey">Groq API Key:</label>
<input type="text" id="apiKey" placeholder="ここにGroq APIキーを入力 (gsk_...)" value="">
<!-- ▲▲▲ 上記の value="" にGroq APIキーを直接記載しても動作します ▲▲▲ -->

<div id="chat"></div>

<div id="inputArea">
  <input type="text" id="userInput" placeholder="質問を入力してください...">
  <button id="sendBtn">送信</button>
</div>

<script>
/* =========================================================
   1. システムプロンプト定義 (各約500字、具体的な役割定義)
   ========================================================= */

const SYSTEM_PROMPTS = {

  Chief: `あなたは「チーフ」という名のAIエージェントです。あなたの役割は、複数のAIエージェント(思考・精密・創造)が生成した中間成果物を受け取り、それらを単一の滑らかな最終回答へと統合(マージ)することです。あなたは執筆者ではなく「料理長」です。複数の食材(素材)をそのまま並べる(コピペ)のではなく、一つの完成した料理として再構築して提供してください。`,

  Thinker: `あなたは「思考」という名のAIエージェントです。あなたの役割は、ユーザーの要望を最初に受け取り、その意図・目的・対象物を正確に解釈し、タスクを構成要素に分解することです。前提条件を整理し、曖昧な点があれば明確化し、論理的かつ構造的にユーザーの要望を解きほぐしてください。感情や主観を排除し、事実とロジックに基づいて分析します。あなたはこのリレーの最初の工程であり、続く2つの専門エージェント(精密・創造)が迷わず作業できるよう、タスクの輪郭を明確にすることが最大の責務です。`,

  Creator: `あなたは「創造」という名のAIエージェントです。あなたの役割は、渡された対象物の世界観・トーン・表現の「器」を作ることです。比喩、物語性、感情に訴える言葉づかいを駆使し、独創的で魅力的な表現を構築してください。論理的厳密さよりも、発想の豊かさ・独自性・ワクワク感を重視します。あなたの言葉づかいは生き生きとしており、読み手の想像力を刺激する表現を用いてください。`,

  Analyst: `あなたは「精密」という名のAIエージェントです。あなたの役割は、渡された対象物のルール・データ・手順・数値・ロジックを、正確かつ厳密に整理することです。曖昧さや矛盾を排し、誰が読んでも同じ理解に到達できる明確な構造を作ってください。感情的な装飾や比喩は避け、事実と手順の正確性のみを追求します。`
};

/* =========================================================
   1-b. 共通サブエージェント用「出力範囲限定」命令文
   ※ 思考・精密・創造、3つのサブエージェントすべてに共通で付与する。
      チーフ(最終マージ役)には付与しない。
   ========================================================= */
const SCOPE_LIMIT_INSTRUCTION = `

【厳格な職能制限ルール】
あなたは複数のAIエージェントが連携する処理パイプラインの中の、一つの工程を担当している。
以下のルールを絶対に守ること。

1.【参照範囲の固定】
あなたが扱える情報は、直前のエージェントから渡された「入力テキスト」と、今回あなたに与えられた「担当タスク」の二つだけである。それ以外の知識(一般的な業界知識、よくあるテンプレート、自分の事前学習由来の"定型的な正解パターン")を持ち込んで処理対象を上書き・拡張してはならない。

2.【職能の越境禁止】
あなたの職能は「思考(解釈・分解)」「精密(ルール・データの正確な整形)」「創造(世界観・表現)」のうち、今回与えられた一つのみである。他の職能が本来担うべき要素を自分の判断で追加してはならない。入力に存在しない要素を"親切心"で補完するのは禁止行為である。

3.【逸脱検知の自己チェック】
出力する前に自問すること:「これは渡された入力テキストの対象物から自然に導出されたものか? それとも自分が知っている"よくあるパターン"に当てはめてしまっていないか?」後者に該当する場合は、入力テキストの具体的な単語・対象・文脈に立ち返って書き直すこと。

4.【次工程への受け渡し最適化】
あなたの出力は、人間が読む最終回答ではなく、次のエージェントがそのまま素材として使う「半製品」である。次の工程が組み込みやすいよう、余計な前置き・まとめ・結論の蛇足を省き、担当範囲の成果物のみをシンプルかつ高密度に出力すること。`;

/* =========================================================
   1-c. 【チーフ】専用の「最終マージ」厳格命令文
   ========================================================= */
const MERGE_INSTRUCTION = `

【最終統合(マージ)に関する絶対命令】
あなたに渡されるのは、異なる専門エージェントが生成した複数の「素材テキスト」である。これらに対し、以下を厳守して最終回答を生成すること。

■ 絶対禁止事項
・素材Aの文章+素材Bの文章を、そのままの文面でコピーして縦に連結する行為(ツギハギ出力)は絶対に禁止する。
・「ここからは技術的な話です」のような、素材の切れ目が露呈する接続も禁止する。
・最終出力に、別々の文体・別々のテンションが混在してはならない。

■ マージの方法(必須プロセス)
1. 複数の素材の中から「器(世界観・トーン・構成の骨格)」を担っている素材を特定する。
2. その「器」の文体・トーン・構成を全体のベースとして採用する。
3. 残りの素材が持つ「中身(ルール・データ・ロジックなどの実質的な内容)」を、器の文体に合わせて言い回しを変換しながら、内部に溶け込ませる。数値・ルール・正確性は変えてはならないが、言葉づかいは器に完全に従わせること。
4. 最終的に一人の書き手が一気に書き下ろしたかのような、単一の文体・単一のテンションで通った文章として出力する。

■ 整合性チェック(出力前の自己検証)
・最終文章のどこかで急に文体やテンションが変わっていないか?
・ルールや数値などの正確性が必須な情報が、言い回しを変えても意味として欠落・改変されていないか?
・読者が「これは複数のAIが別々に書いた断片の合体である」と気づけるような不自然な継ぎ目が残っていないか?
これらに抵触する場合は、文章全体を一度解体し、器の文体に合わせてすべての要素を書き直すこと。

■ あなたの役割の比喩
あなたは「複数の食材(素材)を受け取った料理長」である。食材を皿の上にそのまま並べる(コピペ)のではなく、一つの完成した料理(単一の文章)として再構築して提供すること。`;

/* コマンド名とエージェントキーの対応 */
const COMMAND_MAP = {
  "Call_Chief": "Chief",
  "Call_Thinker": "Thinker",
  "Call_Creator": "Creator",
  "Call_Analyst": "Analyst"
};

const AGENT_LABEL = {
  Chief: "チーフ",
  Thinker: "思考",
  Creator: "創造",
  Analyst: "精密"
};

/* =========================================================
   2. 「思考」エージェント専用のコマンド出力指示(末尾に付与)
   ※ 2段階リレーのため、ここでは「指定エージェント①」と
      「指定エージェント②」の両方を一度に指定させる。
      チーフは含めない(チーフへの引き継ぎはシステム側が自動で行う)。
   ========================================================= */
const COMMAND_INSTRUCTION = `

【重要な出力ルール】
あなたの回答(タスク分解・解釈)を書き終えたら、必ず最後に、この後どの2つの専門エージェントにどの順番で作業を引き継ぐべきかを、下記の形式で出力してください(チーフは含めないでください。チーフへの引き継ぎはシステム側が自動で行います)。

Call_Creator(エージェントに渡したい具体的な指示文)
Call_Analyst(エージェントに渡したい具体的な指示文)

・上記2行のうち、実際に使うのは「精密」(Call_Analyst)と「創造」(Call_Creator)のいずれか2つを、実行してほしい順番で記載してください。同じエージェントを2回指定することはできません。
・1行目に書いたコマンドが先に実行され、その成果物が2行目のコマンドのエージェントに引き継がれます。
・括弧の中には、そのエージェントが読んでそのまま作業に取りかかれるよう、具体的で自己完結したプロンプト文を書いてください。ユーザーの要望全体の対象物(何についてのタスクか)を必ず明記し、抽象的な指示で終わらせないこと。
・コマンド行は必ず2行のみとし、それより後に他の文章を書かないでください。
・自分自身(思考)を指定することはできません。`;

/* =========================================================
   3. 会話履歴管理
   ========================================================= */
let conversationLog = []; // {role: 'user'|'agent', agentKey, content}

function appendMessage(role, content, agentKey) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'agent');

  if (role === 'agent') {
    const label = document.createElement('div');
    label.className = 'agentName';
    label.textContent = '🔹 ' + AGENT_LABEL[agentKey];
    div.appendChild(label);
  }

  const body = document.createElement('div');
  body.textContent = content;
  div.appendChild(body);

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function appendSystemNote(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'system';
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* =========================================================
   4. コマンド抽出ロジック (2段階リレー対応: 2つのコマンドを順番通りに抽出)
   ========================================================= */
function extractCommands(text) {
  // テキスト中に現れる Call_XXX( ... ) を出現順にすべて抽出する。
  const regex = /Call_(Chief|Thinker|Creator|Analyst)\s*\(([\s\S]*?)\)/g;
  const results = [];
  let match;
  while ((match = regex.exec(text)) !== null) {
    results.push({
      agentKey: COMMAND_MAP["Call_" + match[1]],
      prompt: match[2].trim()
    });
  }
  return results;
}

/* 回答本文からコマンド行(複数)を取り除いた表示用テキストを作る */
function stripCommands(text) {
  return text.replace(/Call_(Chief|Thinker|Creator|Analyst)\s*\([\s\S]*?\)\s*\n?/g, '').trim();
}

/* =========================================================
   5. Groq API 呼び出し
   ========================================================= */
async function callGroqAPI(systemPrompt, userContent) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) {
    alert('Groq APIキーを入力してください。');
    throw new Error('No API Key');
  }

  const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + apiKey
    },
    body: JSON.stringify({
      model: "meta-llama/llama-4-scout-17b-16e-instruct",
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: userContent }
      ],
      temperature: 0.7
    })
  });

  if (!response.ok) {
    const errText = await response.text();
    throw new Error("API Error: " + response.status + " " + errText);
  }

  const data = await response.json();
  return data.choices[0].message.content;
}

/* =========================================================
   6. メイン処理フロー
   (4段階リレー: 思考 → 指定エージェント① → 指定エージェント② → チーフ)
   ========================================================= */
let isProcessing = false;

async function handleSend() {
  if (isProcessing) return;
  const inputEl = document.getElementById('userInput');
  const userText = inputEl.value.trim();
  if (!userText) return;

  isProcessing = true;
  inputEl.value = '';
  appendMessage('user', userText);

  try {
    /* ---- STEP 1: 思考が要望を解釈・タスク分解 ---- */
    appendSystemNote((AGENT_LABEL['Thinker']) + ' が考えています...');
    const thinkerSystemPrompt = SYSTEM_PROMPTS['Thinker'] + SCOPE_LIMIT_INSTRUCTION + COMMAND_INSTRUCTION;
    const thinkerRaw = await callGroqAPI(thinkerSystemPrompt, userText);
    const thinkerDisplay = stripCommands(thinkerRaw);
    appendMessage('agent', thinkerDisplay || '(本文なし)', 'Thinker');

    let commands = extractCommands(thinkerRaw);

    // 不正な指定(Chief/Thinkerや重複)を除去し、有効なものだけ残す
    commands = commands.filter(c => c.agentKey === 'Creator' || c.agentKey === 'Analyst');
    // 重複排除(同じエージェントが2回指定された場合は最初の1つだけ採用)
    const seen = new Set();
    commands = commands.filter(c => {
      if (seen.has(c.agentKey)) return false;
      seen.add(c.agentKey);
      return true;
    });

    if (commands.length === 0) {
      appendSystemNote('※ 思考エージェントが有効なエージェント指定コマンドを出力しなかったため、処理を終了しました。');
      return;
    }

    // 1つしか指定されなかった場合は、残りのエージェントを自動補完する
    if (commands.length === 1) {
      const missing = commands[0].agentKey === 'Creator' ? 'Analyst' : 'Creator';
      commands.push({ agentKey: missing, prompt: commands[0].prompt });
      appendSystemNote('※ 2つ目のエージェント指定が無かったため、自動的に「' + AGENT_LABEL[missing] + '」を補完しました。');
    }

    const firstCmd = commands[0];
    const secondCmd = commands[1];

    /* ---- STEP 2: 指定エージェント①が作動 ---- */
    appendSystemNote((AGENT_LABEL[firstCmd.agentKey]) + ' が考えています...');
    const firstSystemPrompt = SYSTEM_PROMPTS[firstCmd.agentKey] + SCOPE_LIMIT_INSTRUCTION;
    const firstRaw = await callGroqAPI(firstSystemPrompt, firstCmd.prompt);
    const firstDisplay = firstRaw.trim();
    appendMessage('agent', firstDisplay || '(本文なし)', firstCmd.agentKey);

    /* ---- STEP 3: 指定エージェント②が、①の成果物を引き継いで作動 ---- */
    appendSystemNote((AGENT_LABEL[secondCmd.agentKey]) + ' が考えています...');
    const secondSystemPrompt = SYSTEM_PROMPTS[secondCmd.agentKey] + SCOPE_LIMIT_INSTRUCTION;
    const secondUserContent =
      '【担当タスク】\n' + secondCmd.prompt +
      '\n\n【前工程(' + AGENT_LABEL[firstCmd.agentKey] + ')からの引き継ぎ内容。この内容を踏まえて、自分の職能の範囲内で処理を加えること】\n' +
      firstDisplay;
    const secondRaw = await callGroqAPI(secondSystemPrompt, secondUserContent);
    const secondDisplay = secondRaw.trim();
    appendMessage('agent', secondDisplay || '(本文なし)', secondCmd.agentKey);

    /* ---- STEP 4: チーフが厳格マージ命令に基づき最終回答を生成 ---- */
    appendSystemNote((AGENT_LABEL['Chief']) + ' が最終回答をまとめています...');

    const chiefUserContent =
      '【ユーザーの元の要望】\n' + userText +
      '\n\n【素材1: ' + AGENT_LABEL[firstCmd.agentKey] + 'による中間成果物】\n' + firstDisplay +
      '\n\n【素材2: ' + AGENT_LABEL[secondCmd.agentKey] + 'による中間成果物(素材1を引き継いで加工済み)】\n' + secondDisplay +
      '\n\n上記の素材をすべて踏まえ、ユーザーの元の要望に対する単一の最終回答を生成してください。';

    const chiefSystemPrompt = SYSTEM_PROMPTS['Chief'] + MERGE_INSTRUCTION;
    const chiefRaw = await callGroqAPI(chiefSystemPrompt, chiefUserContent);
    const chiefDisplay = chiefRaw.trim();
    appendMessage('agent', chiefDisplay || '(本文なし)', 'Chief');

  } catch (err) {
    appendSystemNote('エラーが発生しました: ' + err.message);
  } finally {
    isProcessing = false;
  }
}

document.getElementById('sendBtn').addEventListener('click', handleSend);
document.getElementById('userInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleSend();
});
</script>

</body>
</html>
